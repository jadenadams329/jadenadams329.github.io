<body>
<!-- HEADER HERE -->
<div class="wrapper">
	<header class="clearfix">
        <figure class="logo">
            <img src="images/logo.png" alt="logo">
        </figure>
 <h1>Swag Shop</h1>
    </header>
</div>
    
    
<!-- NAVIGATION HERE -->
<div class="wrapper">
    <nav class="clearfix">
        <button id="hamburgerBtn">
            <span><i>&equiv;</i>OPEN</span>
            <span><i>&otimes;</i>CLOSE</span>
        </button>
        <ul id="primaryNav" >
            <li><a href="#">Home</a></li> 
            <li><a href="#">Products</a></li> 
            <li><a href="#">Deals</a></li> 
            <li class="parent"><a href="#">Order</a>
                <ul>
                    <li><a href="#">Water Bottles</a></li> 
                    <li><a href="#">Hats</a></li> 
                    <li><a href="#">Shirts</a></li> 
                </ul>
            </li>
            <li><a href="#">Customer Reviews</a></li>       
        </ul>
    </nav>
    </div>
    
    
<!-- CONTENT HERE -->
<div class="wrapper">
<main>
    <h1>Order</h1>
    <form method="get" action="thanks.html">
        <fieldset>
            <legend>Customer Information</legend>
            <label class="top">Full Name*<input type="text" name="fname" required></label>
            <label class="top">Phone*<input type="text" name="phone" required></label>
            <label class="top">Email*<input type="email" name="email" required placeholder="janedoe@mail.com"></label>
        </fieldset>

        <fieldset>
            <legend>Swag Information</legend>
            <label class="top">Date Needed<input type="date" name="dateNeeded"></label>
            <label class="top">Business Name<input type="text" name="name"></label>
            <label class="top">Business URL<input type="url" name="url"  placeholder="http://"></label>
            <label class="top">Color
                <select name="color">
                    <option value="">Please Select &#9662;</option>
                    <option value="red">Red</option>
                    <option value="blue">Blue</option>
                    <option value="black">Black</option>
                    <option value="white">White</option>
                    <option value="silver">Silver</option>
                    <option value="yellow">Yellow</option>
                </select>
            </label>
            <label class="top">Quantity<input type="number" name="quantity"></label>
            <div>Material</div>
            <label class="sbs"><input type="radio" name="material" value="aluminum">Aluminum</label>
            <label class="sbs"><input type="radio" name="material" value="plastic">Plastic</label>
        </fieldset>

        <fieldset>
            <legend>
                Payment Information
            </legend>
            <label class="top">Name on Card*<input type="text" name="name" required></label>
            <label class="top">Card Number*<input type="text" name="cardNumber" required></label>
            <label class="top">Expiration Date*<input type="date" name="expirationDate" required></label>
        </fieldset>

        <input type="submit" value="Order My Swag" class="submitBtn">



    </form>
        

          
        
    </main>
</div>
    
<!-- FOOTER HERE -->  
<div class="wrapper">

</body>
