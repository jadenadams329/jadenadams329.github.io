<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="description" content="Fill Me In">

    <!-- This start file was build by Paul Cheney  -->
    <title>Boston City: Visit</title>

    <!-- TELLS PHONES NOT TO LIE ABOUT THEIR WIDTH & stops the font from enlarging when a phone is turned sideways-->

    <!-- STYLE SHEETS -->
    <link href="css/contact-us.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <!-- Add icon library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="https://kit.fontawesome.com/3263ee05d9.js" crossorigin="anonymous"></script>
</head>

<body>
    <!-- HEADER HERE -->
    <div class="headerWrapper">
        <header class="clearfix">
            <figure class="logo">
                <img src="images/logo3.png" alt="logo"
                    srcset="images/logo1.png 1x, images/logo2.png 2x, images/logo3.png 3x">
            </figure>

        </header>
    </div>


    <!-- NAVIGATION HERE -->
    <nav class="clearfix">
        <button onclick="toggleMenu()">&#9776;</button>
        <ul id="primaryNav" class="hide">
            <li><a href="index.html">Home</a></li>
            <li ><a href="services.html">Services</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li class="active"><a href="contact-us.html">Contact Us</a></li>
        </ul>
    </nav>

    <!-- CONTENT HERE -->

    <main>
        <h1>
            Contact Us
        </h1>
        <form method="get" action="thanks.html">
            <fieldset>
                <legend>Customer Information</legend>
                <label class="top">Full Name*<input type="text" name="fname" required></label>
                <label class="top">Phone*<input type="text" name="phone" required></label>
                <label class="top">Email*<input type="email" name="email" required placeholder="janedoe@mail.com"></label>
            </fieldset>
    
            <fieldset>
                <legend>Car Information</legend>
                <label class="top">Date Needed<input type="date" name="dateNeeded"></label>
                <label class="top">Car Year<input type="text" name="name"></label>
                <label class="top">Car Make<input type="text" name="name"  ></label>
                <label class="top">Car Model<input type="text" name="name"  ></label>
                <label class="top">Type of Service
                    <select name="color">
                        <option value="">Please Select &#9662;</option>
                        <option value="red">Check Engine Light Diagnostic</option>
                        <option value="blue">Upgrades/Custom modifications</option>
                        <option value="black">General Maintenance</option>
                        <option value="white">Mechanical Repair</option>
                        <option value="silver">Transportation Services</option>
                        <option value="yellow">Coding - Programming</option>
                    </select>
                </label>
            </fieldset>
    
            <input type="submit" value="Fix My Car" class="submitBtn">
    
        </form>
        
    </main>

    <!-- FOOTER HERE -->
    <div class="footerWrapper">
        <footer>
            <div class="social">
                <a href="" class="fab fa-facebook-square"></a>
                <a href="" class="fab fa-twitter-square"></a>
                <a href="" class="fab fa-instagram-square"></a>
                <a href="" class="fab fa-youtube-square"></a>
            </div>
            <p>For education purposes</p>
        </footer>
    </div>

    <script src="js/scripts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanilla-lazyload@17.3.0/dist/lazyload.min.js"></script>
    <script>
        var lazyLoadInstance = new LazyLoad({
            elements_selector: ".lazy",
            thershold: 0
        });
    </script>
</body>

</html>
